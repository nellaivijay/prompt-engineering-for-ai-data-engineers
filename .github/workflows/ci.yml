name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint-and-unit-test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 15
      fail-fast: true
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Create virtual environment and install dependencies
      run: |
        uv venv
        uv pip install --upgrade pip
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov flake8 mypy black
    
    - name: Lint with flake8
      run: |
        uv run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        uv run black --check .
    
    - name: Type check with mypy
      run: |
        uv run mypy tools/ --ignore-missing-imports
    
    - name: Run unit tests with coverage
      run: |
        uv run pytest tests/ --cov=tools --cov-report=xml --cov-report=term
    
    - name: Generate coverage report (80%)
      run: |
        uv run pytest tests/ --cov=tools --cov-report=term --cov-fail-under=80
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Create virtual environment and install security tools
      run: |
        uv venv
        uv pip install bandit
    
    - name: Run Bandit Security Scan
      run: |
        uv run bandit -r tools/ -f json -o bandit-report.json || true
        uv run bandit -r tools/
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      with:
        name: security-scan-results
        path: bandit-report.json

  dependency-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Create virtual environment and install safety tools
      run: |
        uv venv
        uv pip install safety
    
    - name: Check for security vulnerabilities
      run: |
        uv run safety check --json --output safety-report.json || true
        uv run safety check
    
    - name: Upload safety results
      uses: actions/upload-artifact@v4
      with:
        name: safety-results
        path: safety-report.json

  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true

    - name: Create virtual environment and install dependencies
      run: |
        uv venv
        uv pip install --upgrade pip
        uv pip install -r requirements.txt
        uv pip install pytest pytest-cov

    - name: Run integration tests (without API keys)
      run: |
        uv run pytest tests/integration/ --verbose --tb=short -m "not requires_api_key"
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Run integration tests (with API keys if available)
      if: env.OPENAI_API_KEY != ''
      run: |
        uv run pytest tests/integration/ --verbose --tb=short
      env:
        PYTHONPATH: ${{ github.workspace }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Upload integration test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: integration-test-results
        path: pytest-report.xml
