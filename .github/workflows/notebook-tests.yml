name: Notebook Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'content/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'content/**'

permissions:
  contents: read

jobs:
  test-notebooks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        module: ['module1-foundations', 'module2-data-cleaning', 'module3-etl-enhancement']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Install dependencies
      run: |
        uv pip install --upgrade pip
        uv pip install -r requirements.txt
        uv pip install nbconvert pytest jupyter
    
    - name: Convert notebooks to Python scripts
      run: |
        jupyter nbconvert --to python content/${{ matrix.module }}/*.ipynb
    
    - name: Run notebook tests
      run: |
        pytest content/${{ matrix.module }}/ --verbose
      env:
        PYTHONPATH: ${{ github.workspace }}
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.module }}
        path: pytest-report.xml

  notebook-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Install quality tools
      run: |
        uv pip install nbqa black isort flake8
    
    - name: Check notebook formatting
      run: |
        nbqa black content/ --check
    
    - name: Check notebook imports
      run: |
        nbqa isort content/ --check-only
    
    - name: Lint notebooks
      run: |
        nbqa flake8 content/
