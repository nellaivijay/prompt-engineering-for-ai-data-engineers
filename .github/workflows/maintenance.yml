name: Maintenance

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Install pip-tools
      run: |
        uv pip install pip-tools
    
    - name: Update requirements
      run: |
        pip-compile requirements.in --upgrade
    
    - name: Check for changes
      id: changes
      run: |
        if git diff --exit-code requirements.txt; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Pull Request
      if: steps.changes.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        title: 'Update dependencies'
        body: 'Automated dependency update'
        branch: 'update-dependencies'
        commit-message: 'Update dependencies'

  check-broken-links:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install UV
      uses: astral-sh/setup-uv@v7.3.1
      with:
        enable-cache: true
    
    - name: Install link checker
      run: |
        uv pip install lychee
    
    - name: Check for broken links
      run: |
        lychee '**/*.md' --no-progress --exclude-mail --exclude "https://github.com/your-username/*" --exclude "https://your-username.github.io/*" > link-check-results.txt 2>&1 || true
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: link-check-results
        path: link-check-results.txt
