name: "License Check"

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check license headers
        run: |
          python tools/check_license.py
