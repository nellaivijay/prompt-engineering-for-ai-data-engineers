# Model Configuration File
# Contains detailed information about supported AI models

models:
  openai:
    gpt-4-turbo:
      provider: "openai"
      model_name: "gpt-4-turbo"
      context_window: 128000
      max_tokens: 4096
      cost_per_1k_tokens:
        input: 0.01
        output: 0.03
      strengths:
        - "Complex reasoning"
        - "SQL generation"
        - "Data analysis"
        - "Code generation"
      best_for:
        - "SQL query generation"
        - "Complex data transformation"
        - "Business logic extraction"
      latency: "medium"
      accuracy: "very_high"
      
