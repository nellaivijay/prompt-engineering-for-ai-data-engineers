# Model Selection Guidelines
selection_guidelines:
  data_cleaning:
    recommended: ["claude-3-sonnet", "gpt-4-turbo", "mixtral-8x7b"]
    cost_optimized: ["llama-3.1-70b", "mixtral-8x7b", "claude-3-haiku"]
    latency_sensitive: ["claude-3-haiku", "gemini-flash", "llama-3.2-3b"]
    
  sql_generation:
    recommended: ["gpt-4-turbo", "claude-3-opus", "mistral-large"]
    cost_optimized: ["mixtral-8x7b", "llama-3.1-70b"]
    latency_sensitive: ["gemini-flash", "claude-3-haiku"]
    
  data_documentation:
    recommended: ["claude-3-sonnet", "gpt-4-turbo", "gemini-pro"]
    cost_optimized: ["llama-3.1-70b", "mixtral-8x7b"]
    latency_sensitive: ["claude-3-haiku", "gemini-flash"]
    
  real_time_processing:
    recommended: ["claude-3-haiku", "gemini-flash", "llama-3.2-3b"]
    cost_optimized: ["llama-3.2-3b", "gemini-flash"]
    
  complex_reasoning:
    recommended: ["gpt-4-turbo", "claude-3-opus", "mistral-large"]
    cost_optimized: ["mixtral-8x7b", "llama-3.1-70b"]
